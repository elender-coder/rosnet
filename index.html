<html lang="es">
<head>
  <link rel="icon" href="televisa.jpg">
  <link rel="stylesheet" href="bootstrap-diego/css/bootstrap.min.css">
  <title>televisa</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:black;
      overflow-x:hidden;
    }

    /* HEADER */
    .header{
      text-align:center;
      padding:20px;
      background:black;
      color:pink;
      position:relative;
      font-size:22px;
    }

    /* BOTÓN MENÚ */
    .menu-btn{
      position:absolute;
      left:15px;
      top:15px;
      background:pink;
      border:none;
      padding:10px 15px;
      font-size:20px;
      cursor:pointer;
      border-radius:5px;
      z-index:1200;
    }

    /* SIDEBAR */
    .sidebar{
      position:fixed;
      left:-240px;
      top:0;
      width:220px;
      height:100%;
      background:#111;
      padding-top:60px;
      transition:0.3s;
      z-index:1000;
    }

    .sidebar.active{
      left:0;
    }

    .sidebar a{
      display:block;
      color:white;
      text-decoration:none;
      padding:15px;
    }

    .sidebar a:hover{
      background:pink;
      color:black;
    }

    .close-btn{
      position:absolute;
      top:10px;
      right:10px;
      background:red;
      color:white;
      border:none;
      padding:5px 10px;
      cursor:pointer;
      border-radius:5px;
    }

    /* OVERLAY */
    .overlay{
      position:fixed;
      width:100%;
      height:100%;
      top:0;
      left:0;
      background:rgba(0,0,0,0.5);
      display:none;
      z-index:900;
    }

    .overlay.active{
      display:block;
    }

    /* CONTENIDO */
    .container{
      padding:40px;
      display:flex;
      justify-content:center;
      gap:30px;
      flex-wrap:wrap;
    }

    /* TARJETAS */
    .product{
      background:white;
      width:250px;
      padding:20px;
      border-radius:10px;
      text-align:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
      transition:transform 0.2s;
    }

    /* 🔥 EFECTO INTERACTIVO IMÁGENES */
    .product img{
      width:100%;
      border-radius:10px;
      transition:transform 0.2s;
      cursor:pointer;
    }

    .product img:active{
      transform:scale(1.08);
    }

    .product:hover{
      transform:scale(1.03);
    }

    button{
      background:black;
      color:white;
      border:none;
      padding:10px 20px;
      border-radius:5px;
      cursor:pointer;
    }

    /* 📱 RESPONSIVE REAL */
    @media (max-width:768px){

      .container{
        flex-direction:column;
        align-items:center;
        padding:20px;
        gap:20px;
      }

      .product{
        width:90%;
        max-width:320px;
      }

      .menu-btn{
        left:10px;
        top:10px;
      }

      .header{
        font-size:18px;
      }
    }

  </style>
</head>

<body>

<!-- MENÚ -->
<div class="sidebar" id="sidebar">
  <button class="close-btn" onclick="toggleMenu()">✖</button>
  <h3 style="text-align:center;color:pink;">Televisa</h3>
  <a href="#">Menú</a>
  <a href="#">Programas</a>
  <a href="#">Noticias</a>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- HEADER -->
<div class="header">
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
  Televisa
</div>

<!-- CONTENIDO -->
<section class="container">

  <div class="product">
    <img src="televisa.jpg">
    <h3>episodio 1</h3>
    <a href="episodio 1.html"><button>Entrar</button></a>
  </div>

  <div class="product">
    <img src="televisa.jpg">
    <h3>episodio 2</h3>
    <a href="on2.html"><button>Comprar</button></a>
  </div>

  <div class="product">
    <img src="on.png">
    <h3>sudaderas</h3>
    <a href="on sudaderas3.html"><button>Comprar</button></a>
  </div>

</section>

<footer style="background:black;color:white;text-align:center;padding:15px;">
  <p>© Televisa</p>
</footer>

<script>
  function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
  }
</script>

</body>
</html>
