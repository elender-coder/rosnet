<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="televisa.jpg">
  <title>Televisa</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:black;
      overflow-x:hidden;
    }

    /* HEADER */
    .header{
      text-align:center;
      padding:18px;
      background:black;
      color:pink;
      position:relative;
      font-size:22px;
    }

    /* BOTÓN MENÚ */
    .menu-btn{
      position:absolute;
      left:12px;
      top:12px;
      background:pink;
      border:none;
      padding:10px 14px;
      font-size:20px;
      cursor:pointer;
      border-radius:5px;
    }

    /* BUSCADOR */
    .search-box{
      position:absolute;
      right:12px;
      top:12px;
    }

    .search-box input{
      padding:8px 10px;
      border-radius:5px;
      border:none;
      outline:none;
      width:160px;
    }

    /* SIDEBAR */
    .sidebar{
      position:fixed;
      left:-240px;
      top:0;
      width:220px;
      height:100%;
      background:#111;
      padding-top:60px;
      transition:0.3s;
      z-index:1000;
    }

    .sidebar.active{
      left:0;
    }

    .sidebar a{
      display:block;
      color:white;
      text-decoration:none;
      padding:15px;
    }

    .sidebar a:hover{
      background:pink;
      color:black;
    }

    .close-btn{
      position:absolute;
      top:10px;
      right:10px;
      background:red;
      color:white;
      border:none;
      padding:5px 10px;
      border-radius:5px;
    }

    /* OVERLAY */
    .overlay{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.5);
      display:none;
      z-index:900;
    }

    .overlay.active{
      display:block;
    }

    /* CONTENIDO */
    .container{
      padding:20px;
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
    }

    /* TARJETAS */
    .product{
      background:white;
      width:100%;
      max-width:260px;
      padding:15px;
      border-radius:10px;
      text-align:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
      transition:transform 0.2s;
    }

    .product img{
      width:100%;
      border-radius:10px;
      transition:transform 0.2s;
      cursor:pointer;
    }

    .product img:active{
      transform:scale(1.06);
    }

    .product:hover{
      transform:scale(1.02);
    }

    button{
      background:black;
      color:white;
      border:none;
      padding:10px 18px;
      border-radius:5px;
      cursor:pointer;
    }

    /* RESPONSIVE */
    @media (max-width:768px){

      .header{
        font-size:18px;
        padding:15px;
      }

      .menu-btn{
        top:10px;
        left:10px;
        padding:9px 12px;
        font-size:18px;
      }

      .search-box input{
        width:120px;
      }

      .container{
        flex-direction:column;
        align-items:center;
      }

      .product{
        width:95%;
        max-width:320px;
      }
    }

  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <button class="close-btn" onclick="toggleMenu()">✖</button>
  <h3 style="text-align:center;color:pink;">Televisa</h3>
  <a href="index.html">Menú</a>
  <a href="programas.html">Programas</a>
  <a href="noticias.html">Noticias</a>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- HEADER -->
<div class="header">
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
  Televisa

  <div class="search-box">
    <input type="text" id="search" placeholder="Buscar..." onkeyup="buscar()">
  </div>
</div>

<!-- CONTENIDO -->
<section class="container">

  <div class="product">
    <img src="televisa.jpg">
    <h3>episodio 1</h3>
    <a href="episodio 1.html"><button>ver</button></a>
  </div>

  <div class="product">
    <img src="televisa.jpg">
    <h3>episodio 2</h3>
    <a href="episodio 2.html"><button>ver</button></a>
  </div>

  <div class="product">
    <img src="televisa.jpg">
    <h3>sudaderas</h3>
    <a href="on sudaderas3.html"><button>comprar</button></a>
  </div>

</section>

<footer style="background:black;color:white;text-align:center;padding:15px;">
  <p>© Televisa</p>
</footer>

<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

/* BUSCADOR */
function buscar(){
  let input = document.getElementById("search").value.toLowerCase();
  let productos = document.querySelectorAll(".product");

  productos.forEach(p => {
    let texto = p.innerText.toLowerCase();
    p.style.display = texto.includes(input) ? "block" : "none";
  });
}
</script>

</body>
</html>
